<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Emanuele Favero" />
    <title>Our Team</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css" />

    <!-- JS -->
    <script defer src="assets/js/main.js"></script>
  </head>
  <body>
    <main>
      <!-- TITLE/DESCRIPTION -->
      <h1 class="title">Meet our Team</h1>
      <p class="description">
        Lorem ipsum dolor, sit amet consectetur adipisicing elit. Ut aut odit,
        voluptates minima eius, perspiciatis a nobis porro fuga libero accusamus
        facilis vitae voluptatem tempora sunt! Consequuntur nesciunt beatae
        provident.
      </p>

      <!-- NEW MEMBER FORM -->
      <form class="new-member-form" id="new-member-form">
        <div class="input-container">
          <label for="name">Name</label>
          <input
            type="text"
            name="name"
            id="name"
            placeholder="Name"
            required
          />
        </div>
        <div class="input-container">
          <label for="role">Role</label>
          <input
            type="text"
            name="role"
            id="role"
            placeholder="Role"
            required
          />
        </div>
        <div class="input-container">
          <label for="email">Email</label>
          <input
            type="email"
            name="email"
            id="email"
            placeholder="Email"
            required
          />
        </div>
        <button type="submit">Add team member</button>
      </form>

      <!-- CARD LIST -->
      <ul class="card-list"></ul>
    </main>
  </body>
</html>
